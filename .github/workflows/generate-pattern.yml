name: Generate synchronization pattern files

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/generate-pattern.sh'
  pull_request:
    branches: [ main ]
    paths:
      - 'docs/generate-pattern.sh'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install tools
      run: |
        set -e
        sudo apt update
        sudo apt install -y ffmpeg
        pip3 install -U -r tool/requirements.txt

    - name: Generate video files
      run: |
        set -e
        ./docs/generate-pattern.sh -outdir _site

    - name: Upload generated media
      uses: actions/upload-artifact@v4
      with:
        name: sync-pattern-media
        path: _site/
