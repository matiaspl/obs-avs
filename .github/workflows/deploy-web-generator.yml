name: Deploy Klaps Cue Generator

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/synced-cue-generator.html'
      - '.github/workflows/deploy-web-generator.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - uses: actions/checkout@v4

    - name: Build web generator site
      run: |
        set -e
        mkdir -p _site
        base_url="https://matiaspl.github.io/klaps"
        for file in \
          av-offset-pattern-6000.mov \
          av-offset-pattern-5994.mov \
          av-offset-pattern-5000.mov \
          av-offset-pattern-3000.mov \
          av-offset-pattern-2997.mov \
          av-offset-pattern-2400.mov \
          av-offset-pattern-2398.mov
        do
          curl -fsSL "$base_url/$file" -o "_site/$file"
        done
        cp docs/synced-cue-generator.html _site/index.html
        cp docs/synced-cue-generator.html _site/synced-cue-generator.html
        touch _site/.nojekyll

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: _site/

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
