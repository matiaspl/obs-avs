name: Plugin Build

on:
  workflow_dispatch:
    inputs:
      sign_macos:
        description: Require Developer ID signing for the macOS artifacts
        required: true
        type: boolean
        default: true
  push:
    paths-ignore:
      - '**.md'
    branches:
      - main
    tags:
      - '*'
  pull_request:
    paths-ignore:
      - '**.md'
    branches:
      - main

env:
  artifactName: ${{ contains(github.ref_name, '/') && 'artifact' || github.ref_name }}
  qt: true

jobs:
  linux_build:
    runs-on: ${{ matrix.ubuntu }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - obs: 31
            ubuntu: 'ubuntu-24.04'
          - obs: 32
            ubuntu: 'ubuntu-24.04'
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download obs-studio development environment
        id: obsdeps
        uses: norihiro/obs-studio-devel-action@v2
        with:
          obs: ${{ matrix.obs }}
          verbose: true
          qt: ${{ env.qt }}

      - name: Build plugin
        run: |
          set -ex
          cmake -S . -B build \
            -D CMAKE_BUILD_TYPE=RelWithDebInfo \
            -D CPACK_DEBIAN_PACKAGE_SHLIBDEPS=ON \
            -D PKG_SUFFIX=-obs${{ matrix.obs }}-${{ matrix.ubuntu }}-x86_64 \
            ${{ steps.obsdeps.outputs.PLUGIN_CMAKE_OPTIONS }}
          cd build
          make -j4
          make package
          echo "FILE_NAME=$(find $PWD -name '*.deb' | head -n 1)" >> $GITHUB_ENV
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.artifactName }}-linux-obs${{ matrix.obs }}-${{ matrix.ubuntu }}
          path: '${{ env.FILE_NAME }}'
      - name: Check package
        run: |
          . build/ci/ci_includes.generated.sh
          set -ex
          sudo apt install -y '${{ env.FILE_NAME }}'
          ldd /usr/lib/x86_64-linux-gnu/obs-plugins/${PLUGIN_NAME}.so > ldd.out
          if grep not.found ldd.out ; then
            echo "Error: unresolved shared object." >&2
            exit 1
          fi
          ls /usr/share/obs/obs-plugins/${PLUGIN_NAME}/

  macos_build:
    runs-on: macos-14
    env:
      MACOS_SIGNING_REQUESTED: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.sign_macos) }}
      MACOS_SIGNING_REQUIRED: ${{ github.event_name == 'workflow_dispatch' && inputs.sign_macos }}
      MACOS_NOTARIZATION_REQUESTED: ${{ startsWith(github.ref, 'refs/tags/') }}
    strategy:
      fail-fast: false
      matrix:
        obs: [31, 32]
        arch: ['universal']
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Environment
        id: setup
        env:
          MACOS_SIGNING_APPLICATION_IDENTITY: ${{ secrets.MACOS_SIGNING_APPLICATION_IDENTITY }}
          MACOS_SIGNING_INSTALLER_IDENTITY: ${{ secrets.MACOS_SIGNING_INSTALLER_IDENTITY }}
          MACOS_SIGNING_CERT: ${{ secrets.MACOS_SIGNING_CERT }}
          MACOS_SIGNING_CERT_PASSWORD: ${{ secrets.MACOS_SIGNING_CERT_PASSWORD }}
          MACOS_NOTARIZATION_USERNAME: ${{ secrets.MACOS_NOTARIZATION_USERNAME }}
          MACOS_NOTARIZATION_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
          MACOS_TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
        run: |
          set -e
          echo '::group::Set up code signing'
          signing_secrets=(
            MACOS_SIGNING_APPLICATION_IDENTITY
            MACOS_SIGNING_INSTALLER_IDENTITY
            MACOS_SIGNING_CERT
            MACOS_SIGNING_CERT_PASSWORD
          )
          missing_signing_secrets=()
          for name in "${signing_secrets[@]}"; do
            if [[ -z "${!name}" ]]; then
              missing_signing_secrets+=("$name")
            fi
          done

          if (( ${#missing_signing_secrets[@]} == 0 )); then
            echo "haveCodesignIdent=true" >> $GITHUB_OUTPUT
          else
            echo "haveCodesignIdent=false" >> $GITHUB_OUTPUT
            if [[ "$MACOS_SIGNING_REQUIRED" == 'true' ]]; then
              printf '::error::Required macOS signing secret is not configured: %s\n' \
                "${missing_signing_secrets[@]}"
              exit 1
            fi
          fi

          notarization_secrets=(
            MACOS_NOTARIZATION_USERNAME
            MACOS_NOTARIZATION_PASSWORD
            MACOS_TEAM_ID
          )
          missing_notarization_secrets=()
          for name in "${notarization_secrets[@]}"; do
            if [[ -z "${!name}" ]]; then
              missing_notarization_secrets+=("$name")
            fi
          done

          if (( ${#missing_notarization_secrets[@]} == 0 )); then
            echo "haveNotarizationUser=true" >> $GITHUB_OUTPUT
          else
            echo "haveNotarizationUser=false" >> $GITHUB_OUTPUT
          fi
          echo '::endgroup::'

      - name: Install Apple Developer Certificate
        if: ${{ env.MACOS_SIGNING_REQUESTED == 'true' && steps.setup.outputs.haveCodesignIdent == 'true' }}
        uses: apple-actions/import-codesign-certs@5142e029c445c10ffc7149d172e540235a065466 # v7.0.0
        with:
          keychain-password: ${{ github.run_id }}
          p12-file-base64: ${{ secrets.MACOS_SIGNING_CERT }}
          p12-password: ${{ secrets.MACOS_SIGNING_CERT_PASSWORD }}

      - name: Set up notarization credentials
        if: ${{ env.MACOS_NOTARIZATION_REQUESTED == 'true' && steps.setup.outputs.haveNotarizationUser == 'true' }}
        env:
          MACOS_NOTARIZATION_USERNAME: ${{ secrets.MACOS_NOTARIZATION_USERNAME }}
          MACOS_NOTARIZATION_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
          MACOS_TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
        run: |
          set -e
          xcrun notarytool store-credentials AC_PASSWORD \
            --apple-id "$MACOS_NOTARIZATION_USERNAME" \
            --team-id "$MACOS_TEAM_ID" \
            --password "$MACOS_NOTARIZATION_PASSWORD"

      - name: Download obs-studio development environment
        id: obsdeps
        uses: norihiro/obs-studio-devel-action@v2
        with:
          path: /tmp/deps-${{ matrix.obs }}-${{ matrix.arch }}
          arch: ${{ matrix.arch }}
          obs: ${{ matrix.obs }}
          verbose: true
          qt: ${{ env.qt }}

      - name: Build plugin
        env:
          MACOS_SIGNING_APPLICATION_IDENTITY: ${{ secrets.MACOS_SIGNING_APPLICATION_IDENTITY }}
        run: |
          arch=${{ matrix.arch }}
          deps=/tmp/deps-${{ matrix.obs }}-${{ matrix.arch }}
          MACOSX_DEPLOYMENT_TARGET=${{ steps.obsdeps.outputs.MACOSX_DEPLOYMENT_TARGET }}
          GIT_TAG=$(git describe --tags --always)
          PKG_SUFFIX=-${GIT_TAG}-obs${{ matrix.obs }}-macos-${{ matrix.arch }}
          codesign_identity=-
          if [[ "$MACOS_SIGNING_REQUESTED" == 'true' && \
                '${{ steps.setup.outputs.haveCodesignIdent }}' == 'true' ]]; then
            codesign_identity="$MACOS_SIGNING_APPLICATION_IDENTITY"
          fi
          set -e
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_PREFIX_PATH="$PWD/release/" \
            -DCMAKE_OSX_ARCHITECTURES=${arch/#universal/x86_64;arm64} \
            -D PKG_SUFFIX=$PKG_SUFFIX \
            -D OBS_BUNDLE_CODESIGN_IDENTITY="$codesign_identity" \
            ${{ steps.obsdeps.outputs.PLUGIN_CMAKE_OPTIONS }}
          cmake --build build --config RelWithDebInfo

      - name: Prepare package
        run: |
          set -ex
          . build/ci/ci_includes.generated.sh
          cmake --install build --config RelWithDebInfo --prefix=release

      - name: Codesign
        if: ${{ env.MACOS_SIGNING_REQUESTED == 'true' && steps.setup.outputs.haveCodesignIdent == 'true' }}
        env:
          MACOS_SIGNING_APPLICATION_IDENTITY: ${{ secrets.MACOS_SIGNING_APPLICATION_IDENTITY }}
        run: |
          . build/ci/ci_includes.generated.sh
          set -e
          plugin_bundle="release/${PLUGIN_NAME}.plugin"

          while IFS= read -r -d '' dylib; do
            codesign --force --options runtime --timestamp \
              --sign "$MACOS_SIGNING_APPLICATION_IDENTITY" "$dylib"
          done < <(find "$plugin_bundle" -type f -name '*.dylib' -print0)

          codesign --force --options runtime --timestamp \
            --entitlements cmake/bundle/macos/entitlements.plist \
            --sign "$MACOS_SIGNING_APPLICATION_IDENTITY" "$plugin_bundle"
          codesign --verify --deep --strict --verbose=4 "$plugin_bundle"

      - name: Package
        run: |
          . build/ci/ci_includes.generated.sh
          set -ex
          zipfile=$PWD/package/${PLUGIN_NAME}${PKG_SUFFIX}.zip
          mkdir package
          (cd release/ && zip -r $zipfile ${PLUGIN_NAME}.plugin)
          ci/macos/install-packagesbuild.sh
          packagesbuild \
            --build-folder $PWD/package/ \
            build/installer-macOS.generated.pkgproj

      - name: Productsign
        if: ${{ env.MACOS_SIGNING_REQUESTED == 'true' && steps.setup.outputs.haveCodesignIdent == 'true' }}
        env:
          MACOS_SIGNING_INSTALLER_IDENTITY: ${{ secrets.MACOS_SIGNING_INSTALLER_IDENTITY }}
        run: |
          . build/ci/ci_includes.generated.sh
          pkgfile=package/${PLUGIN_NAME}${PKG_SUFFIX}.pkg
          set -e
          productsign --sign "$MACOS_SIGNING_INSTALLER_IDENTITY" $pkgfile package/${PLUGIN_NAME}-signed.pkg
          mv package/${PLUGIN_NAME}-signed.pkg $pkgfile
          pkgutil --check-signature "$pkgfile"

      - name: Notarize
        if: ${{ env.MACOS_NOTARIZATION_REQUESTED == 'true' && steps.setup.outputs.haveCodesignIdent == 'true' && steps.setup.outputs.haveNotarizationUser == 'true' }}
        run: |
          . build/ci/ci_includes.generated.sh
          set -e
          pkgfile="package/${PLUGIN_NAME}${PKG_SUFFIX}.pkg"
          zipfile="package/${PLUGIN_NAME}${PKG_SUFFIX}.zip"

          xcrun notarytool submit "$pkgfile" --keychain-profile AC_PASSWORD --wait
          xcrun notarytool submit "$zipfile" --keychain-profile AC_PASSWORD --wait
          xcrun stapler staple "$pkgfile"
          xcrun stapler validate "$pkgfile"
          spctl --assess --type install --verbose=4 "$pkgfile"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.artifactName }}-macos-obs${{ matrix.obs }}-${{ matrix.arch }}
          path: package/*

  windows_build:
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        obs: [31, 32]
        arch: [x64]
    env:
      visualStudio: 'Visual Studio 17 2022'
      Configuration: 'RelWithDebInfo'
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Download obs-studio
        id: obsdeps
        uses: norihiro/obs-studio-devel-action@v2
        with:
          obs: ${{ matrix.obs }}
          qt: ${{ env.qt }}

      - name: Build plugin
        run: |
          $CmakeArgs = @(
            '-G', "${{ env.visualStudio }}"
            '-DCMAKE_SYSTEM_VERSION=10.0.18363.657'
          )
          cmake -S . -B build ${{ steps.obsdeps.outputs.PLUGIN_CMAKE_OPTIONS_PS }} @CmakeArgs
          cmake --build build --config RelWithDebInfo -j 4
          cmake --install build --config RelWithDebInfo --prefix "$(Resolve-Path -Path .)/release"
      - name: Package plugin
        run: ci/windows/package-windows.cmd ${{ matrix.obs }}
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.artifactName }}-windows-obs${{ matrix.obs }}-${{ matrix.arch }}
          path: package/*
